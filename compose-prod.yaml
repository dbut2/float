name: float

services:
  float-demo:
    image: ghcr.io/dbut2/float:latest
    environment:
      - DEMO_MODE=true
      - DATABASE_DSN=postgres://float:float@demo-db:5432/float?sslmode=disable
      - BASE_URL=https://float-demo.dbut.dev
    networks:
      - web
      - default
    labels:
      "traefik.docker.network": "web"
      "traefik.enable": "true"
      "traefik.http.routers.float-demo.entrypoints": "web"
      "traefik.http.routers.float-demo.rule": "Host(`float-demo.dbut.dev`)"
      "traefik.http.services.float-demo.loadbalancer.server.port": "8080"
      "com.centurylinklabs.watchtower.scope": "float"
    depends_on:
      demo-db:
        condition: service_healthy

  demo-db:
    image: postgres:18
    environment:
      POSTGRES_USER: float
      POSTGRES_PASSWORD: float
      POSTGRES_DB: float
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U float"]
      interval: 2s
      timeout: 5s
      retries: 5

  float:
    image: ghcr.io/dbut2/float:latest
    environment:
      - DATABASE_DSN=${PROD_DSN}
      - BASE_URL=https://float.dbut.dev
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CF_ACCESS_AUD=${CF_ACCESS_AUD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}
    networks:
      - web
      - default
    labels:
      "traefik.docker.network": "web"
      "traefik.enable": "true"
      "traefik.http.routers.float.entrypoints": "web"
      "traefik.http.routers.float.rule": "Host(`float.dbut.dev`)"
      "traefik.http.services.float.loadbalancer.server.port": "8080"
      "com.centurylinklabs.watchtower.scope": "float"

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.40
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
      - WATCHTOWER_SCOPE=float
    labels:
      "traefik.docker.network": "web"
      "traefik.enable": "true"
      "traefik.http.routers.watchtower-float.entrypoints": "web"
      "traefik.http.routers.watchtower-float.rule": "Host(`watchtower-float.dbut.dev`)"
      "traefik.http.services.watchtower-float.loadbalancer.server.port": "8080"
      "com.centurylinklabs.watchtower.scope": "float"
    networks:
      - web

networks:
  web:
    external: true

