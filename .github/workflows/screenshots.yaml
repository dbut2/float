name: Screenshots

on:
  pull_request:
  merge_group:

permissions:
  contents: write

env:
  PAGES: >-
    [
      { "name": "home", "path": "/" },
      { "name": "bucket", "path": "/buckets/00000000-0000-4000-8000-000000000012" },
      { "name": "rules", "path": "/rules" }
    ]

jobs:
  screenshots:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'dependabot/') }}
    name: Screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: dbut2

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Install Playwright
        run: |
          mkdir -p /tmp/playwright-screenshots
          cd /tmp/playwright-screenshots
          npm init -y > /dev/null
          npm install @playwright/test > /dev/null
          npx playwright install chromium --with-deps

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          docker compose logs
          exit 1

      - name: Take screenshots
        id: screenshots
        working-directory: /tmp/playwright-screenshots
        run: |
          cat > playwright.config.ts <<'EOF'
          import { defineConfig } from "@playwright/test";
          export default defineConfig({ testDir: "." });
          EOF

          cat > screenshots.spec.ts <<'SPEC'
          import { test } from "@playwright/test";
          import { createHash } from "crypto";
          import { writeFileSync } from "fs";

          const BASE = "http://localhost:8080";
          const WORKSPACE = process.env.GITHUB_WORKSPACE!;
          const pages = JSON.parse(process.env.PAGES!);

          test.use({ viewport: { width: 390, height: 844 }, colorScheme: "dark" });

          const mockDate = () => {
            const FIXED_NOW = new Date('2026-05-10T00:00:00Z').getTime();
            const _D = globalThis.Date;
            (globalThis as any).Date = class extends _D {
              constructor(...args: any[]) {
                super(...(args.length ? args : [FIXED_NOW]));
              }
              static now() { return FIXED_NOW; }
            };
          };

          test("screenshots", async ({ page }) => {
            const hash = createHash("sha256");
            await page.addInitScript(mockDate);
            for (const p of pages) {
              await page.goto(`${BASE}${p.path}`);
              await page.waitForTimeout(2000);
              hash.update(await page.content());
              await page.screenshot({ path: `${WORKSPACE}/docs/screenshots/${p.name}.png` });
            }
            writeFileSync("content-hash.txt", hash.digest("hex"));
          });
          SPEC

          npx playwright test --config playwright.config.ts screenshots.spec.ts

          NEW_HASH=$(cat content-hash.txt)
          OLD_HASH=""
          if [ -f "${GITHUB_WORKSPACE}/docs/screenshots/.content-hash" ]; then
            OLD_HASH=$(cat "${GITHUB_WORKSPACE}/docs/screenshots/.content-hash")
          fi

          echo "old=$OLD_HASH"
          echo "new=$NEW_HASH"

          if [ "$NEW_HASH" != "$OLD_HASH" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "hash=$NEW_HASH" >> "$GITHUB_OUTPUT"
            echo "Content has changed, will commit screenshots"
          else
            git -C "${GITHUB_WORKSPACE}" restore docs/screenshots/
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Content unchanged, screenshots discarded"
          fi

      - name: Commit screenshot changes
        if: steps.screenshots.outputs.changed == 'true'
        run: |
          echo "${{ steps.screenshots.outputs.hash }}" > docs/screenshots/.content-hash
          git config user.name "dylan-botler[bot]"
          git config user.email "dylan-botler[bot]@users.noreply.github.com"
          git add docs/screenshots/
          git commit -m "Update screenshots"
          git push

      - name: Stop services
        if: always()
        run: docker compose down
