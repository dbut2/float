services:
  float:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DEMO_MODE=true
      - BASE_URL=http://localhost:8080
      - DATABASE_DSN=postgres://float:float@db:5432/float?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: float
      POSTGRES_PASSWORD: float
      POSTGRES_DB: float
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U float"]
      interval: 2s
      timeout: 5s
      retries: 5
